<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<style>
/* ── reset ── */
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:'Segoe UI',system-ui,sans-serif;background:#f4f3ef;color:#1a1917;}
button{cursor:pointer;font-family:inherit;}
input,select,textarea{font-family:inherit;}

/* ── LOGIN ── */
#login-screen{position:fixed;inset:0;background:#161614;display:flex;align-items:center;justify-content:center;z-index:9999;}
#login-box{background:#1e1d1b;border:1px solid #2a2a27;border-radius:14px;padding:36px 40px;width:340px;max-width:90vw;}
#login-logo{font-size:28px;font-weight:800;color:#F7931A;margin-bottom:4px;letter-spacing:.01em;}
#login-sub{font-size:12px;color:#555;margin-bottom:28px;}
.login-label{font-size:10px;color:#666;text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px;display:block;}
.login-input{width:100%;background:#252422;border:1px solid #333;border-radius:7px;padding:10px 12px;font-size:14px;color:#f0efe8;outline:none;margin-bottom:12px;}
.login-input:focus{border-color:#F7931A;}
#login-btn{width:100%;padding:11px;background:#F7931A;color:#0f0f0d;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;margin-top:4px;letter-spacing:.04em;}
#login-btn:hover{background:#e07e10;}
#login-err{font-size:12px;color:#ef4444;text-align:center;margin-top:10px;min-height:18px;}
#login-badge{font-size:10px;color:#444;text-align:center;margin-top:16px;}

/* ── APP SHELL ── */
.app-shell{display:flex;height:100vh;overflow:hidden;}
#sidebar{width:220px;min-width:220px;background:#161614;color:#f0efe8;display:flex;flex-direction:column;height:100vh;overflow-y:auto;flex-shrink:0;}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
#bottom-nav{display:none;}

/* ── SIDEBAR ── */
#sidebar-header{padding:18px 18px 12px;border-bottom:1px solid #252422;}
#sidebar-title{font-size:14px;font-weight:700;color:#F7931A;letter-spacing:.02em;}
#sidebar-sub{font-size:10px;color:#444;margin-top:2px;}
.nav-section{padding:12px 12px 3px;font-size:9px;color:#3a3a38;letter-spacing:.1em;text-transform:uppercase;font-weight:600;}
.nav-item{display:flex;align-items:center;gap:8px;padding:7px 18px;font-size:13px;color:#888;cursor:pointer;border-left:2px solid transparent;transition:all .15s;}
.nav-item:hover{color:#f0efe8;background:#1e1d1b;}
.nav-item.active{color:#F7931A;border-left-color:#F7931A;background:#1e1d1b;}
.nav-item .icon{font-size:13px;width:16px;text-align:center;}
#sidebar-footer{padding:12px 18px;border-top:1px solid #252422;font-size:10px;color:#333;margin-top:auto;}
#user-badge{display:inline-block;font-size:10px;background:#252422;color:#F7931A;padding:2px 8px;border-radius:99px;margin-bottom:6px;}
#logout-btn{font-size:10px;color:#555;background:none;border:none;cursor:pointer;padding:0;font-family:inherit;}
#logout-btn:hover{color:#f0efe8;}

/* ── TOPBAR ── */
#topbar{background:#fff;border-bottom:1px solid #e8e6e0;padding:0 22px;height:50px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
#page-title{font-size:16px;font-weight:600;white-space:nowrap;}
#topbar-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.live-badge{font-size:10px;background:#dcfce7;color:#166534;padding:2px 8px;border-radius:99px;font-weight:700;letter-spacing:.04em;cursor:pointer;}

/* ── CONTENT ── */
#content{flex:1;overflow-y:auto;padding:18px 22px;}

/* ── CARDS ── */
.card{background:#fff;border:1px solid #e8e6e0;border-radius:10px;padding:14px 18px;margin-bottom:12px;}
.card-title{font-size:10px;color:#999;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;font-weight:600;}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px;}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px;}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.stat-card{background:#fff;border:1px solid #e8e6e0;border-radius:10px;padding:13px 15px;}
.stat-label{font-size:10px;color:#999;text-transform:uppercase;letter-spacing:.07em;margin-bottom:3px;}
.stat-val{font-size:20px;font-weight:700;line-height:1.2;}
.stat-sub{font-size:11px;color:#999;margin-top:2px;}

/* ── TABLES ── */
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:360px;}
th{text-align:left;padding:7px 10px;background:#f4f3ef;color:#777;font-size:10px;text-transform:uppercase;letter-spacing:.06em;font-weight:600;border-bottom:1px solid #e8e6e0;}
td{padding:7px 10px;border-bottom:1px solid #f0efe8;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#faf9f6;}

/* ── FORMS ── */
.form-row{display:grid;gap:8px;margin-bottom:8px;}
.form-row.c2{grid-template-columns:1fr 1fr;}
.form-row.c3{grid-template-columns:1fr 1fr 1fr;}
.form-row.c4{grid-template-columns:1fr 1fr 1fr 1fr;}
label{font-size:10px;color:#888;text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:3px;}
input[type=text],input[type=number],input[type=date],input[type=month],input[type=password],select,textarea{width:100%;border:1px solid #e0ded8;border-radius:6px;padding:8px 10px;font-size:13px;outline:none;background:#fff;color:#1a1917;}
input:focus,select:focus,textarea:focus{border-color:#F7931A;box-shadow:0 0 0 2px rgba(247,147,26,.1);}
textarea{resize:vertical;min-height:60px;}

/* ── BUTTONS ── */
.btn{padding:8px 14px;border-radius:7px;font-size:13px;font-weight:600;border:none;}
.btn-primary{background:#F7931A;color:#fff;}
.btn-primary:hover{background:#e07e10;}
.btn-ghost{background:transparent;border:1px solid #e0ded8;color:#555;}
.btn-ghost:hover{background:#f4f3ef;}
.btn-sm{padding:5px 10px;font-size:11px;}

/* ── MISC ── */

.progress{height:7px;background:#f0efe8;border-radius:99px;overflow:hidden;margin:3px 0;}

.tag{display:inline-block;font-size:11px;padding:2px 7px;border-radius:5px;background:#f0efe8;color:#666;}
.del-btn{background:none;border:none;color:#ddd;font-size:12px;padding:2px 5px;cursor:pointer;}
.del-btn:hover{color:#ef4444;}
.two-col{display:grid;grid-template-columns:1fr 360px;gap:14px;align-items:start;}
.budget-over{color:#ef4444;font-weight:600;}
.budget-ok{color:#16a34a;font-weight:600;}
.section-divider{font-size:10px;color:#aaa;text-transform:uppercase;letter-spacing:.1em;padding:12px 0 6px;border-top:1px solid #f0efe8;margin-top:6px;font-weight:600;}

.pa-main{flex:1;min-width:0;}

.pa-sub{font-size:11px;color:#aaa;margin-top:1px;}
.pa-val{text-align:right;flex-shrink:0;}

.goal-row{display:flex;align-items:center;gap:10px;padding:10px 14px;background:#fff;border:1px solid #e8e6e0;border-radius:9px;margin-bottom:7px;}

.goal-name{font-size:13px;font-weight:600;min-width:150px;flex-shrink:0;}
.goal-note{font-size:11px;color:#aaa;min-width:100px;flex-shrink:0;}
.goal-bar-wrap{flex:1;min-width:60px;}
.goal-pct-text{font-size:11px;color:#999;white-space:nowrap;flex-shrink:0;min-width:48px;text-align:right;}
.goal-amt{font-size:12px;font-weight:600;white-space:nowrap;flex-shrink:0;min-width:90px;text-align:right;}
.goal-date{font-size:10px;color:#aaa;flex-shrink:0;min-width:60px;text-align:right;}
.month-bar{background:#fff;border-bottom:1px solid #e8e6e0;padding:10px 22px;display:flex;align-items:center;gap:12px;flex-shrink:0;}
.month-label{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.08em;font-weight:600;}
select.month-sel{border:1px solid #e0ded8;border-radius:6px;padding:5px 8px;font-size:13px;background:#f4f3ef;outline:none;min-width:130px;}

/* ── BOTTOM NAV ── */
#bottom-nav{position:fixed;bottom:0;left:0;right:0;height:56px;background:#161614;border-top:1px solid #252422;display:flex;align-items:stretch;z-index:100;}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:transparent;border:none;color:#555;cursor:pointer;padding:5px 2px;-webkit-tap-highlight-color:transparent;}
.bnav-item.active{color:#F7931A;}
.bnav-icon{font-size:17px;line-height:1;}
.bnav-label{font-size:9px;letter-spacing:.03em;font-family:inherit;}
#more-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;}
#more-sheet{display:none;position:fixed;bottom:56px;left:0;right:0;background:#fff;border-radius:16px 16px 0 0;padding:14px;z-index:201;box-shadow:0 -4px 24px rgba(0,0,0,.15);}

.more-btn-icon{font-size:18px;display:block;margin-bottom:3px;}

/* ── RESPONSIVE ── */
@media(max-width:768px){

  .two-col{grid-template-columns:1fr;}

  .stat-val{font-size:17px;}
  .stat-card,.card{padding:10px 12px;}
  table{font-size:12px;min-width:300px;}
  .goal-row{flex-wrap:wrap;}
  .goal-note{display:none;}
  .month-bar{padding:8px 12px;}
  input[type=text],input[type=number],input[type=date],input[type=month],input[type=password],select,textarea{font-size:16px;}
}
</style>
</head>

// ══════════════════════════════════════════════════════
// AUTH — credentials stored as base64 to avoid plain text
// ══════════════════════════════════════════════════════
// To decode manually: atob('Ym9vaw==') => 'book', atob('dGVzdA==') => 'test'
const _U=[
  {u:atob('Ym9vaw=='),p:atob('Ym9vaw=='),role:'owner'},
  {u:atob('dGVzdA=='),p:atob('dGVzdA=='),role:'guest'},
];
function _chk(u,p){return _U.find(x=>x.u===u&&x.p===p)||null;}

let currentUser=null;

async function doLogin(){
  const u=document.getElementById('l-user').value.trim();
  const p=document.getElementById('l-pass').value;
  const match=_chk(u,p);
  if(!match){
    document.getElementById('login-err').textContent='Incorrect username or password.';
    document.getElementById('l-pass').value='';
    return;
  }
  currentUser=match;
  // Derive cloud key from credentials — same key on every device
  _cloudKey=await _sha256(u+p);
  sessionStorage.setItem('fm_sess',btoa(JSON.stringify({u:match.u,r:match.role})));
  sessionStorage.setItem('fm_ck',_cloudKey);
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('user-name-display').textContent=match.u+(match.role==='guest'?' (guest)':'');
  startApp();
}

function doLogout(){
  sessionStorage.removeItem('fm_sess');
  currentUser=null;
  document.getElementById('app').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('l-user').value='';
  document.getElementById('l-pass').value='';
  document.getElementById('login-err').textContent='';
}

// auto-login if session exists
(function(){
  try{
    const s=sessionStorage.getItem('fm_sess');
    if(!s)return;
    const d=JSON.parse(atob(s));
    const match=_U.find(x=>x.u===d.u);
    if(!match)return;
    currentUser=match;
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app').style.display='flex';
    document.getElementById('user-name-display').textContent=match.u+(match.role==='guest'?' (guest)':'');
  }catch{}
})();

// ── helpers ──
function uid(){return'x'+Date.now().toString(36)+Math.random().toString(36).slice(2,5);}
function fmt(n,d=0){n=parseFloat(n)||0;if(n>=1e6)return'฿'+(n/1e6).toFixed(2)+'M';if(n>=1000)return'฿'+(n/1000).toFixed(d)+'k';return'฿'+n.toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d});}
function fmtFull(n){return'฿'+Math.round(parseFloat(n)||0).toLocaleString();}
function fmtSat(s){s=parseInt(s)||0;if(s>=1e8)return(s/1e8).toFixed(8)+' BTC';if(s>=1e6)return(s/1e6).toFixed(4)+'M sat';if(s>=1000)return(s/1000).toFixed(2)+'k sat';return s.toLocaleString()+' sat';}
function monthLabel(m){if(!m)return'';const[y,mo]=m.split('-');return['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][parseInt(mo)-1]+' '+y;}
function txM(m){return DB.transactions.filter(t=>t.date.startsWith(m));}
function incM(m){return DB.income.filter(i=>i.month===m);}
function spentM(m){return txM(m).filter(t=>t.cat!=='ออมเงิน, ลงทุน').reduce((s,t)=>s+(t.amt||0),0);}
function investM(m){return txM(m).filter(t=>t.cat==='ออมเงิน, ลงทุน').reduce((s,t)=>s+(t.amt||0),0);}
function incTotalM(m){return incM(m).reduce((s,i)=>s+(i.amt||0),0);}
function yearIncome(y){return DB.income.filter(i=>i.month.startsWith(y)).reduce((s,i)=>s+(i.amt||0),0);}
function totalSat(){return DB.btcEntries.reduce((s,e)=>s+(parseInt(e.sat)||0),0);}
function totalBTCInvested(){return DB.btcEntries.reduce((s,e)=>s+(parseFloat(e.thb)||0),0);}
function btcValueTHB(){return btcPrice>0?(totalSat()/1e8)*btcPrice:0;}
function portfolioTotal(){
  const latest=DB.portfolio.at(-1);
  const emg=parseFloat(latest?.emergency)||0;
  const gold=parseFloat(latest?.gold)||0;
  const rmf=parseFloat(latest?.rmf)||0;
  const btcVal=btcPrice>0?btcValueTHB():(parseFloat(latest?.bitcoin)||0);
  return emg+btcVal+gold+rmf;
}

// ── BTC price ──
async function fetchBTCPrice(){
  const badge=document.getElementById('live-badge');
  if(badge)badge.style.background='#fef9c3';
  try{
    const r=await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=thb',{signal:AbortSignal.timeout(6000)});
    const d=await r.json();
    if(d.bitcoin?.thb){
      btcPrice=d.bitcoin.thb;
      if(badge){badge.style.background='#dcfce7';badge.title='BTC: ฿'+Math.round(btcPrice).toLocaleString()+' — click to refresh';}
      const active=document.querySelector('.nav-item.active')?.dataset.page;
      if(active==='dashboard')renderDashboard();
      if(active==='bitcoin')renderBitcoin();
      return;
    }
  }catch{}
  if(badge)badge.style.background='#fee2e2';
}
function startPriceRefresh(){fetchBTCPrice();if(priceInterval)clearInterval(priceInterval);priceInterval=setInterval(fetchBTCPrice,60000);}

function thaiTax(inc,rmf=0,ssf=0,li=0,hi=0){
  const ed=Math.min(inc*.5,100000),pd=60000;
  const td=ed+pd+Math.min(rmf,inc*.30,500000)+Math.min(ssf,inc*.30,200000)+Math.min(li,100000)+Math.min(hi,25000);
  const tx=Math.max(0,inc-td);
  const brackets=[[150000,0],[150000,.05],[200000,.10],[250000,.15],[250000,.20],[1000000,.25],[3000000,.30],[Infinity,.35]];
  let tax=0,rem=tx;for(const[sz,rate]of brackets){if(rem<=0)break;tax+=Math.min(rem,sz)*rate;rem-=sz;}
  return{taxable:tx,tax:Math.round(tax)};
}

  const saved=before.tax-after.tax;
  const maxSaving=before.tax-withMax.tax;
  const extraSaving=maxSaving-saved;

  document.getElementById('content').innerHTML=`
  <div style="background:#eff6ff;border:1px solid #bfdbfe;border-radius:9px;padding:11px 15px;margin-bottom:12px;font-size:13px;color:#1d4ed8;line-height:1.7">

        ${[
          ['Max RMF allowance',fmtFull(maxRmf),'#1a1917'],

// ══════════════════════════════════════════════════════
// GOALS — horizontal chained
// ══════════════════════════════════════════════════════
function checkGoals(){
  if(!DB.chainHits)DB.chainHits={};
  const total=portfolioTotal();
  const btcTHB=btcValueTHB()||(parseFloat(DB.portfolio.at(-1)?.bitcoin)||0);
  const emg=parseFloat(DB.portfolio.at(-1)?.emergency)||0;
  const sal=parseFloat(DB.portfolio.at(-1)?.salary)||0;
  PORTFOLIO_CHAIN.forEach(g=>{if(!DB.chainHits[g.id]&&total>=g.target)DB.chainHits[g.id]=new Date().toISOString().slice(0,10);});
  if(!DB.goals)DB.goals=DEFAULT_GOALS;
  DB.goals.forEach(g=>{
    if(DB.goalHits[g.id])return;
    const v=g.cat==='bitcoin'?btcTHB:g.cat==='emergency'?emg:g.cat==='income'?sal:total;
    if(v>=g.target)DB.goalHits[g.id]=new Date().toISOString().slice(0,10);
  });
  save();
}
function renderGoals(){
  if(!DB.chainHits)DB.chainHits={};
  const total=portfolioTotal();
  const btcTHB=btcValueTHB()||(parseFloat(DB.portfolio.at(-1)?.bitcoin)||0);
  const emg=parseFloat(DB.portfolio.at(-1)?.emergency)||0;
  const lastPortfolioGoalDone=PORTFOLIO_CHAIN.filter(g=>DB.chainHits[g.id]).at(-1);
  const nextPortfolioGoal=PORTFOLIO_CHAIN.find(g=>!DB.chainHits[g.id]);
  const doneCount=Object.keys(DB.goalHits||{}).length+Object.keys(DB.chainHits||{}).length;

  function gRow(id,name,note,target,cat,cur,hitDate){
    const done=!!hitDate;
    const pct=Math.min(cur/target*100,100);
    const color=CAT_COLORS[cat]||'#F7931A';
    return`<div class="goal-row" style="border-color:${done?color+'44':'#e8e6e0'};opacity:${done?.72:1}">
      <span class="goal-cat" style="background:${color}22;color:${color}">${cat.toUpperCase()}</span>
      <div class="goal-name">${done?'✓ ':''} ${name}</div>
      <div class="goal-note">${note}</div>
      <div class="goal-bar-wrap"><div class="progress"><div class="progress-fill" style="width:${pct}%;background:${color}"></div></div></div>
      <div class="goal-pct-text">${pct.toFixed(1)}%</div>
      <div class="goal-amt" style="color:${done?color:'#1a1917'}">${done?'✓ '+fmtFull(target):fmtFull(cur)+' / '+fmtFull(target)}</div>
      <div class="goal-date">${hitDate||''}</div>
    </div>`;
  }

  document.getElementById('content').innerHTML=`
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:6px">
    <div style="font-size:13px;color:#666">${doneCount} milestone${doneCount!==1?'s':''} reached</div>
    <div style="font-size:12px;color:#aaa">Portfolio chain: ${Object.keys(DB.chainHits).length}/${PORTFOLIO_CHAIN.length}</div>
  </div>

  <div style="font-size:10px;color:#aaa;text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px;font-weight:600">Portfolio Chain — showing current target only</div>
  ${lastPortfolioGoalDone?gRow(lastPortfolioGoalDone.id,lastPortfolioGoalDone.name,lastPortfolioGoalDone.note,lastPortfolioGoalDone.target,'portfolio',total,DB.chainHits[lastPortfolioGoalDone.id]):''}
  ${nextPortfolioGoal?gRow(nextPortfolioGoal.id,nextPortfolioGoal.name,nextPortfolioGoal.note,nextPortfolioGoal.target,'portfolio',total,null):'<div class="goal-row" style="background:#f0fdf4;border-color:#bbf7d0"><span style="color:#166534;font-weight:700">🎉 All portfolio milestones reached!</span></div>'}

  <div style="font-size:10px;color:#aaa;text-transform:uppercase;letter-spacing:.1em;margin:14px 0 6px;font-weight:600">Other Goals</div>
  ${(DB.goals||DEFAULT_GOALS).map(g=>{
    const done=!!(DB.goalHits||{})[g.id];
    const cur=g.cat==='bitcoin'?btcTHB:g.cat==='emergency'?emg:g.cat==='income'?(parseFloat(DB.portfolio.at(-1)?.salary)||0):total;
    return gRow(g.id,g.name,g.note,g.target,g.cat,cur,(DB.goalHits||{})[g.id]);
  }).join('')}

  <div class="card" style="margin-top:12px">
    <div class="card-title">Add Custom Goal</div>
    <div class="form-row c4">
      <div><label>Name</label><input type="text" id="g-name" placeholder="Goal name"></div>
      <div><label>Target (฿)</label><input type="number" id="g-target" placeholder="250000"></div>
      <div><label>Category</label><select id="g-cat">${['portfolio','bitcoin','emergency','income','realestate','custom'].map(c=>`<option>${c}</option>`).join('')}</select></div>
      <div><label>Note</label><input type="text" id="g-note" placeholder="Why this matters"></div>
    </div>
    <button class="btn btn-primary btn-sm" onclick="addGoal()">+ Add Goal</button>
  </div>`;
}
function addGoal(){
  const name=document.getElementById('g-name').value.trim(),target=parseFloat(document.getElementById('g-target').value)||0,cat=document.getElementById('g-cat').value,note=document.getElementById('g-note').value;
  if(!name||!target)return;
  if(!DB.goals)DB.goals=[];
  DB.goals.push({id:uid(),name,target,cat,note});save();renderGoals();
}

    ${btcPrice>0&&totalSat()>0?`<div style="font-size:11px;color:#aaa;margin-top:6px">Tip: BTC value auto-calc = ${fmtFull(btcValueTHB())} (${fmtSat(totalSat())} × live price)</div>`:''}
  </div>

        return`<tr><td><strong>${e.date}</strong></td><td>${fmtFull(e.emergency)}</td><td style="color:#F7931A;font-weight:600">${fmtFull(e.bitcoin)}</td><td>${fmtFull(e.gold)}</td><td>${fmtFull(e.rmf)}</td><td><strong>${fmt(t)}</strong></td><td style="font-size:11px;color:#999">${e.notes||''}</td><td><button class="del-btn" onclick="delPortfolio('${e.id}')">✕</button></td></tr>`;
      }).join('')}${DB.portfolio.length===0?'<tr><td colspan="8" style="color:#bbb;text-align:center;padding:18px">No snapshots yet</td></tr>':''}</tbody>

function addPortfolio(){
  const date=document.getElementById('p-date').value;if(!date)return;
  const entry={id:uid(),date,emergency:parseFloat(document.getElementById('p-emg').value)||0,bitcoin:parseFloat(document.getElementById('p-btc').value)||0,gold:parseFloat(document.getElementById('p-gold').value)||0,rmf:parseFloat(document.getElementById('p-rmf').value)||0,salary:parseFloat(document.getElementById('p-salary').value)||0,notes:document.getElementById('p-notes').value};
  const idx=DB.portfolio.findIndex(p=>p.date===date);
  if(idx>=0)DB.portfolio[idx]=entry;else{DB.portfolio.push(entry);DB.portfolio.sort((a,b)=>a.date.localeCompare(b.date));}
  save();checkGoals();renderPortfolio();
}
function delPortfolio(id){if(!confirm('Delete?'))return;DB.portfolio=DB.portfolio.filter(p=>p.id!==id);save();renderPortfolio();}

function exportData(){const b=new Blob([JSON.stringify(DB,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='finance_'+new Date().toISOString().slice(0,10)+'.json';a.click();}
function importData(){const inp=document.createElement('input');inp.type='file';inp.accept='.json';inp.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const imp=JSON.parse(ev.target.result);DB={...DB,...imp};save();alert('Imported successfully.');navigate('dashboard');}catch{alert('Invalid file.');}};r.readAsText(f);};inp.click();}

// ══════════════════════════════════════════════════════
// CLOUD SYNC — Firebase Realtime Database
// Data path = sha256(username+password) so only the
// correct login can read/write its own data.
// Set FIREBASE_URL once — users just login, sync is auto.
// ══════════════════════════════════════════════════════

// ⚠️ YOUR FIREBASE URL:
const FIREBASE_URL='https://fianance-fe078-default-rtdb.asia-southeast1.firebasedatabase.app/';

let _cloudKey=''; // set on login, derived from credentials

async function _sha256(s){
  const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));
  return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('');
}
function _cloudUrl(){
  if(!FIREBASE_URL||!_cloudKey)return null;
  return FIREBASE_URL.replace(/\/+$/,'')+'/d/'+_cloudKey+'.json';
}
function _syncBadge(state){
  const el=document.getElementById('sync-badge');if(!el)return;
  const s={ok:{bg:'#dcfce7',c:'#166534',t:'☁ Synced'},err:{bg:'#fee2e2',c:'#dc2626',t:'☁ Error'},busy:{bg:'#fef9c3',c:'#854d0e',t:'☁ Syncing…'},off:{bg:'#f0efe8',c:'#aaa',t:'☁ Offline'}};
  const r=s[state]||s.off;el.style.background=r.bg;el.style.color=r.c;el.textContent=r.t;
}
async function cloudPush(){
  const url=_cloudUrl();if(!url)return;
  try{
    const r=await fetch(url,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(DB),signal:AbortSignal.timeout(8000)});
    _syncBadge(r.ok?'ok':'err');
  }catch{_syncBadge('err');}
}
async function cloudPull(){
  const url=_cloudUrl();if(!url)return false;
  _syncBadge('busy');
  try{
    const r=await fetch(url,{signal:AbortSignal.timeout(8000)});
    if(!r.ok){_syncBadge('err');return false;}
    const data=await r.json();
    if(!data||typeof data!=='object'||Array.isArray(data)){_syncBadge('ok');return false;}
    // Only overwrite local if cloud has actual data
    const hasCloud=(data.transactions?.length>0)||(data.btcEntries?.length>0)||(data.income?.length>0)||(data.assets?.length>0);
    const hasLocal=(DB.transactions?.length>0)||(DB.btcEntries?.length>0)||(DB.income?.length>0);
    if(!hasCloud&&hasLocal){_syncBadge('ok');return false;}
    DB={...initDB(),...data};
    localStorage.setItem(SK,JSON.stringify(DB));
    _syncBadge('ok');return true;
  }catch{_syncBadge('err');return false;}
}
function showSyncStatus(){
  const url=_cloudUrl();
  const msg=url?'☁ Cloud sync active — data saves automatically on every change.\n\nSame username + password on any device = same data.':'☁ Not syncing (no cloud key — please log out and log back in).';
  alert(msg);
}

// ══════════════════════════════════════════════════════
// APP INIT — only runs after login
// ══════════════════════════════════════════════════════
async function startApp(){
  startPriceRefresh();
  navigate('dashboard');
  // Pull from cloud in background — if data exists, re-render
  if(_cloudKey){
    const pulled=await cloudPull();
    if(pulled)navigate('dashboard');
  } else {
    _syncBadge('off');
  }
}

// Auto-start if already logged in (restore cloud key from session)
if(currentUser){
  const ck=sessionStorage.getItem('fm_ck');
  if(ck){_cloudKey=ck;_syncBadge('busy');}
  startApp();
}
